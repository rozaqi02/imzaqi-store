<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#032235" />
    <script>
      (function () {
        try {
          var key = "imzaqi-theme-v2";
          var saved = window.localStorage.getItem(key);
          var theme = saved === "dark" || saved === "light" ? saved : "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <style>
      html,
      body {
        background: #d8fff5;
      }

      html[data-theme="dark"],
      html[data-theme="dark"] body {
        background: #020611;
      }
    </style>

    <title>Imzaqi Store - Digital Subscription Store</title>
    <meta
      name="description"
      content="Pilih produk, bayar via QRIS, simpan ID order, lalu pantau status order kapan saja."
    />

    <!-- Social preview (Open Graph) -->
    <meta property="og:title" content="Imzaqi Store - Digital Subscription Store" />
    <meta
      property="og:description"
      content="Pilih produk, bayar via QRIS, simpan ID order, lalu pantau status order kapan saja."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="%PUBLIC_URL%/imzaqistore_logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Imzaqi Store - Digital Subscription Store" />
    <meta
      name="twitter:description"
      content="Pilih produk, bayar via QRIS, simpan ID order, lalu pantau status order kapan saja."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/imzaqistore_logo.png" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/imzaqistore_logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/imzaqistore_logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <noscript>Aktifkan JavaScript untuk menjalankan aplikasi ini.</noscript>
    <div id="root"></div>
  </body>
</html>
